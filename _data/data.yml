career-profile:
  title: Career Profile
  summary: |
    Cloud Security Architect and Security Operations Engineer with a B.B.A., specializing in aligning enterprise security architecture with business and regulatory requirements through scalable, cloud-native security engineering. Experienced in designing and operationalizing SIEM and telemetry pipelines—including log ingestion, normalization, enrichment, detection engineering, and automated response workflows—to enable high-fidelity threat detection and rapid incident response. Practitioner of zero-trust architecture with deep experience in security orchestration, proactive threat hunting, control validation, and adversary emulation to continuously assess and strengthen defensive capabilities across cloud environments. 🔐☁️🛡️
