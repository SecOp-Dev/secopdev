projects:
  title: Projects
  intro: >
  assignments:
  - title: Endpoint Detection & Response
    link: #"#hook"
    tagline: "Led an enterprise initiative to standardize endpoint security across a multi-tenant environment by architecting and deploying Microsoft Defender and CrowdStrike across 10,000 endpoints establish consistent detection, prevention, and response capabilities. Implemented unified security baselines, telemetry collection, and policy governance to improve threat visibility, reduce configuration drift, and strengthen endpoint protection across all business units. 🔐💻"

  - title: Microsoft Sentinel
    link: "#"
    tagline: "Designed and implemented a multi-tenant cloud security architecture using Microsoft Sentinel, enabling centralized security monitoring and detection across distributed cloud and on-premises environments. Architected scalable log ingestion, cross-tenant data integration, and detection engineering workflows to support unified threat visibility, automated response, and consistent security governance across the enterprise."

  - title: MDR Architecture
    link: "#"
    tagline: "Served as SOC lead & primary engineer throughout Managed Detection and Response (MDR) platform integrations, consisting of 70 hybrid cloud and on-premises telemetry sources. Architecting redundant Unix-based log collection and secure data forwarding across diverse infrastructure. Enabled centralized threat detection and accelerated incident response by expanding visibility and automated response capabilities across endpoints, identities, and cloud environments. 🔐☁️"

